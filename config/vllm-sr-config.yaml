# vLLM Semantic Router Config for POC Demo
# Minimal config with required fields + memory settings

version: v0.1

# Listeners - Network configuration
listeners:
  - name: "http-8888"
    address: "0.0.0.0"
    port: 8888
    timeout: "300s"

# Providers - LLM endpoints
providers:
  models:
    - name: "qwen3"
      reasoning_family: "qwen3"
      endpoints:
        - name: "llm-katan"
          weight: 1
          endpoint: "172.17.0.1:8002"  # Host machine from inside Docker
          protocol: "http"
  default_model: "qwen3"

# Signals - Classification
signals:
  domains:
    - name: "general"
      description: "General queries"
      mmlu_categories: ["other"]
  keywords: []

decisions:
  - name: "default_route"
    description: "Default routing for all queries"
    priority: 1
    rules:
      operator: "OR"
      conditions:
        - type: "domain"
          name: "general"
    modelRefs:
      - model: "qwen3"

# ========== Memory Configuration (Agentic Memory POC) ==========
memory:
  enabled: true
  
  milvus:
    address: "172.17.0.1:19530"
    collection: "agentic_memory"
    dimension: 384
  
  embedding:
    model: "all-MiniLM-L6-v2"
    dimension: 384
  
  default_retrieval_limit: 5
  default_similarity_threshold: 0.6
  
  # TODO: After demo, disable query_rewrite or switch to production LLM
  # Options for production:
  #   1. enabled: false (disable if not needed)
  #   2. endpoint: "http://172.17.0.1:8002/v1" + model: "qwen3" (local llm-katan)
  query_rewrite:
    enabled: true  # TODO: Set to false after demo
    endpoint: "https://openrouter.ai/api/v1"  # TODO: Remove after demo
    model: "mistralai/devstral-2512:free"  # Fast free model for query rewriting
    max_tokens: 48
  
  extraction:
    enabled: true
    endpoint: "http://172.17.0.1:8002/v1/chat/completions"
    model: "qwen3"
    turns_before_extraction: 3

# Response API
response_api:
  enabled: true
  store_backend: "memory"
  ttl_seconds: 86400
  max_responses: 1000

# Semantic Cache (using defaults)
semantic_cache:
  enabled: true
  backend_type: "memory"
  similarity_threshold: 0.8

# Classifier models
bert_model:
  model_id: models/mom-embedding-light
  threshold: 0.6
  use_cpu: true

classifier:
  category_model:
    model_id: "models/mom-domain-classifier"
    threshold: 0.6
    use_cpu: true
    category_mapping_path: "models/mom-domain-classifier/category_mapping.json"
  pii_model:
    model_id: "models/mom-pii-classifier"
    use_modernbert: false
    threshold: 0.9
    use_cpu: true
  pii_mapping_path: "models/mom-pii-classifier/label_mapping.json"

prompt_guard:
  enabled: true
  use_modernbert: false
  model_id: "models/mom-jailbreak-classifier"
  threshold: 0.7
  use_cpu: true

tools:
  enabled: false
